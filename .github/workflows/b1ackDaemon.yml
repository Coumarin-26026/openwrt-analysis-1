name: Download Repo Files

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: |
          git clone --recursive --depth 1 https://github.com/B1ackDaemon/rpcs3.git

      - name: Compress
        run: |
          tar -czf rpcs3.tar.gz rpcs3

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rpcs3-source
          path: rpcs3.tar.gz
